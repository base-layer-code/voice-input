<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Firebase 爆速共有メモ</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #status { padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #eee; }
    textarea { width: 100%; height: 400px; font-size: 16px; padding: 10px; }
  </style>
</head>
<body>
  <div id="status">接続状態: <span id="connection">接続中...</span> | 人数: <span id="count">0</span></div>
  <textarea id="memo" placeholder="ここに書き込む..."></textarea>

  <script>
    // あなたの画面に映っていた最新の設定です！
    const firebaseConfig = {
      apiKey: "AIzaSyAfjTWeL71syzo7SNpym7ATcbrq6i7JfXQ",
      authDomain: "game-server-df061.firebaseapp.com",
      databaseURL: "https://game-server-df061-default-rtdb.firebaseio.com",
      projectId: "game-server-df061",
      storageBucket: "game-server-df061.firebasestorage.app",
      messagingSenderId: "475396427934",
      appId: "1:475396427934:web:5106a6210aa51e3b8f6b8f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const memoEl = document.getElementById('memo');

    // 接続確認
    db.ref(".info/connected").on("value", (snap) => {
      document.getElementById('connection').innerText = snap.val() ? "オンライン" : "オフライン";
    });

    // 文字の同期
    const memoRef = db.ref('shared_memo');
    memoEl.addEventListener('input', () => { memoRef.set(memoEl.value); });
    memoRef.on('value', (snapshot) => {
      if (document.activeElement !== memoEl) { memoEl.value = snapshot.val() || ""; }
    });

    // 人数カウント
    const presenceRef = db.ref('presence');
    const userRef = presenceRef.push(true);
    userRef.onDisconnect().remove();
    presenceRef.on('value', (snap) => {
      document.getElementById('count').innerText = snap.numChildren();
    });
  </script>
</body>
</html>
